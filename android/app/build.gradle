// android/app/build.gradle
// Moto Vitals — release build configuration

plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services" // Firebase
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) flutterVersionCode = '1'

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) flutterVersionName = '1.0'

// ── Keystore (signing) ────────────────────────────────────────────────────────
// Store these values in android/key.properties (NEVER commit that file to git).
// key.properties format:
//   storePassword=YOUR_STORE_PASSWORD
//   keyPassword=YOUR_KEY_PASSWORD
//   keyAlias=motovitals
//   storeFile=../motovitals-release.jks

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
def keystoreConfigured = keystorePropertiesFile.exists()
if (keystoreConfigured) {
    keystorePropertiesFile.withReader('UTF-8') { reader ->
        keystoreProperties.load(reader)
    }
}

android {
    namespace "com.motovitals.app"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.motovitals.app"
        minSdkVersion 21             // Android 5.0+ — covers ~99% of devices
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    // ── Signing ───────────────────────────────────────────────────────────────
    signingConfigs {
        if (keystoreConfigured) {
            release {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        debug {
            applicationIdSuffix ".debug"      // Installs alongside release
            versionNameSuffix "-debug"
            debuggable true
        }
        release {
            if (keystoreConfigured) {
                signingConfig signingConfigs.release
            } else {
                // Falls back to debug signing in CI if key.properties missing
                signingConfig signingConfigs.debug
            }
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),
                          'proguard-rules.pro'
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    implementation 'androidx.multidex:multidex:2.0.1'
    implementation platform('com.google.firebase:firebase-bom:33.0.0')
}
